<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Editor Paso 2 – Ejercicio</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    span.word {
      cursor: pointer;
      padding: 2px 4px;
      margin: 2px;
      display: inline-block;
    }
    span.selected {
      background: #ffe066;
    }

  .line {
    margin-bottom: 10px;
  }
  .word {
    cursor: pointer;
    padding: 2px 4px;
    margin: 2px;
    display: inline-block;
  }
  .selected {
    background: #ffe066;
  }

  </style>
</head>
<body>

<h2>Paso 2 – Crear ejercicio</h2>

<input id="exerciseName" placeholder="Nombre del ejercicio" />
<br><br>
<textarea id="exerciseDesc" placeholder="Descripción (opcional)"></textarea>

<p>Preguntas seleccionadas: <span id="selectedCount">0</span></p>
<button onclick="selectAll()">Seleccionar Todo</button>
<button onclick="clearSelection()">Limpiar Selección</button>

<h3>Letra</h3>
<div id="lyrics"></div>

<br>
<button onclick="exportExercise()">Exportar ejercicio</button>

<script>
let lyricsBase;
let questionWordIds = new Set();

fetch("../data/lyrics-base.json")
  .then(r => r.json())
  .then(data => {
    lyricsBase = data;
    renderLyrics();
  });

function renderLyrics() {
  const container = document.getElementById("lyrics");
  container.innerHTML = "";

  lyricsBase.lines.forEach(line => {
    const lineDiv = document.createElement("div");
    lineDiv.className = "line";

    line.wordIds.forEach(wordId => {
      const word = lyricsBase.words.find(w => w.id === wordId);
      if (!word) return;

      const span = document.createElement("span");
      span.textContent = word.text;
      span.className = "word";

      if (questionWordIds.has(word.id)) {
        span.classList.add("selected");
      }

      span.onclick = () => toggle(word.id, span);

      lineDiv.appendChild(span);
      lineDiv.append(" ");
    });

    container.appendChild(lineDiv);
  });

  updateSelectedCount();
}

function toggle(id, span) {
  if (questionWordIds.has(id)) {
    questionWordIds.delete(id);
    span.classList.remove("selected");
  } else {
    questionWordIds.add(id);
    span.classList.add("selected");
  }
  updateSelectedCount();
}

function updateSelectedCount() {
  document.getElementById("selectedCount").textContent = questionWordIds.size;
}

function selectAll() {
  lyricsBase.words.forEach(word => {
    if (!questionWordIds.has(word.id)) {
      questionWordIds.add(word.id);
    }
  });
  renderLyrics();
  updateSelectedCount();
}

function clearSelection() {
  questionWordIds.clear();
  renderLyrics();
  updateSelectedCount();
}

function exportExercise() {
  const name = document.getElementById("exerciseName").value.trim();
  const desc = document.getElementById("exerciseDesc").value.trim();

  if (!name) {
    alert("Ingresa un nombre para el ejercicio.");
    return;
  }

  if (questionWordIds.size === 0) {
    alert("Selecciona al menos una palabra para pregunta.");
    return;
  }

  const json = {
    version: "1.0",
    type: "exercise",
    exercise: {
      id: `exercise-${Date.now()}`, // ID único
      songId: lyricsBase.song.id,
      name,
      description: desc,
      questionWordIds: Array.from(questionWordIds)
    }
  };

  const blob = new Blob([JSON.stringify(json, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `${name.replace(/[^a-zA-Z0-9]/g, "_")}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  alert("Ejercicio descargado. Colócalo en la carpeta data/ del proyecto.");
}
</script>

</body>
</html>
