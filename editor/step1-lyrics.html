<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Editor Paso 1 – Letra sincronizada por versos</title>

  <!-- YouTube Iframe API -->
  <script src="https://www.youtube.com/iframe_api"></script>

  <style>
    body { font-family: sans-serif; padding: 20px; }
    textarea { width: 100%; height: 140px; }

    .line { margin-bottom: 10px; }

    .word {
      cursor: pointer;
      padding: 2px 4px;
      margin: 2px;
      display: inline-block;
      border-radius: 4px;
    }

    .word.done {
      background: #00ffcc;
      color: #000;
    }
  </style>
</head>
<body>

<h2>Paso 1 – Sincronizar letra por versos</h2>

<textarea id="lyricsInput" placeholder="Pega aquí la letra (usa saltos de línea reales)"></textarea>
<br><br>
<button onclick="tokenize()">Tokenizar letra</button>

<h3>Video</h3>
<div id="player"></div>

<h3>Letra</h3>
<div id="lyrics"></div>

<br>
<button onclick="exportJSON()">Exportar JSON base</button>

<script>
/* ================================
   YouTube
================================ */
let player;
let ytReady = false;

window.onYouTubeIframeAPIReady = () => {
  ytReady = true;
  initPlayer();
};

function initPlayer() {
  if (!ytReady) return;

  player = new YT.Player("player", {
    height: "315",
    width: "560",
    videoId: "W3q8Od5qJio",
    playerVars: { controls: 1 }
  });
}

/* ================================
   Editor logic
================================ */
let words = [];
let lines = [];
let wordIdCounter = 1;
let lineIdCounter = 1;

function tokenize() {
  if (!player) {
    alert("El video aún no está listo");
    return;
  }

  const text = document.getElementById("lyricsInput").value.trim();
  const container = document.getElementById("lyrics");

  container.innerHTML = "";
  words = [];
  lines = [];
  wordIdCounter = 1;
  lineIdCounter = 1;

  const rawLines = text.split(/\n+/);

  rawLines.forEach(rawLine => {
    const wordIds = [];
    const lineDiv = document.createElement("div");
    lineDiv.className = "line";

    rawLine
  .trim()
  .match(/\p{L}+/gu)
  ?.forEach(token => {

      const word = {
        id: wordIdCounter++,
        text: token,
        time: null
      };

      words.push(word);
      wordIds.push(word.id);

      const span = document.createElement("span");
      span.textContent = token;
      span.className = "word";
      span.onclick = () => assignTime(word, span);

      lineDiv.appendChild(span);
      lineDiv.append(" ");
    });

    lines.push({
      id: lineIdCounter++,
      wordIds
    });

    container.appendChild(lineDiv);
  });
}

function assignTime(word, span) {
  if (!player) return;

  const time = player.getCurrentTime();
  word.time = Number(time.toFixed(2));
  span.classList.add("done");
}

function exportJSON() {
  const json = {
    version: "1.1",
    type: "lyrics-base",
    song: {
      id: "rammstein-du-hast",
      title: "Du hast",
      artist: "Rammstein",
      youtubeId: "W3q8Od5qJio"
    },
    words,
    lines
  };

  console.log(JSON.stringify(json, null, 2));
  alert("JSON base generado. Revisa la consola.");
}
</script>

</body>
</html>
