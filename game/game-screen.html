<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Game Screen</title>
  <script src="https://www.youtube.com/iframe_api"></script>
  <style>
    body { font-family: system-ui, sans-serif; padding: 12px; background: #000; color: #fff; }
    .line { margin-bottom: 8px; font-size: 1.2em; }
    .line.active { background: #e0f7ff; padding: 4px; border-radius: 4px; }
    .word { padding: 2px 4px; border-radius: 4px; transition: background-color 0.2s ease; }
    .word.active { background: #00e5ff; color: #000; font-weight: bold; animation: pulse 0.6s ease-out; }
    @keyframes pulse {
      0% { transform: scale(1); box-shadow: 0 0 0 rgba(255, 213, 79, 0.7); }
      50% { transform: scale(1.15); box-shadow: 0 0 12px rgba(255, 213, 79, 0.9); }
      100% { transform: scale(1); box-shadow: 0 0 0 rgba(255, 213, 79, 0); }
    }
    #topBar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 12px; }
    #topBar h3 { margin: 0; font-size: 1rem; }
    #status { font-weight: bold; color: #00e5ff; font-size: 0.9rem; text-align: right; }
    #videoWrapper { position: relative; width: min(78vw, 1220px); max-width: 100%; }
    #lyricsOverlay {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(6px);
      color: white;
      pointer-events: none;
      box-sizing: border-box;
    }
    #lyricsOverlay .line { margin: 4px 0; font-size: clamp(0.9rem, 2.2vw, 1.2rem); }
    #lyricsOverlay .line.active { background: rgba(255, 255, 255, 0.15); border-radius: 4px; padding: 2px 6px; }
    #scoreboard {
      width: 170px;
      background: #000;
      border: 1px solid #00e5ff;
      padding: 8px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      flex: 0 0 170px;
    }
    #layout { display: flex; gap: 12px; align-items: flex-start; }
    #videoColumn { flex: 1 1 auto; min-width: 0; }
    #rankingList { padding-left: 18px; margin: 6px 0; font-size: 0.85rem; }
    #rankingList li { color: #fff; border-bottom: 1px solid rgba(255,255,255,0.15); padding: 3px 0; }
    #hostControls { margin-top: 8px; display: flex; gap: 4px; justify-content: center; flex-wrap: wrap; }
    #hostControls button {
      width: 26px;
      height: 26px;
      border-radius: 5px;
      border: 1px solid #00e5ff;
      background: #000;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      transition: background 0.15s ease, transform 0.1s ease;
    }
    #hostControls button:hover { background: rgba(0,229,255,0.1); transform: scale(1.05); }
    #hostControls button:active { transform: scale(0.95); }
    #optionsPreview { margin-top: 10px; font-size: 0.78rem; }
    #optionsPreview ul { padding-left: 16px; margin: 6px 0 0; }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal.hidden { display: none; }
    .modal-content {
      background: #000;
      color: #fff;
      border: 2px solid #9c27b0;
      padding: 20px;
      border-radius: 12px;
      min-width: 260px;
      max-width: 600px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      text-align: left;
    }
    .modal-content h3 { margin-top: 0; }
    #playersList {
      list-style: none;
      padding-left: 0;
      margin: 10px 0 15px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 6px 12px;
      max-height: 300px;
      overflow-y: auto;
    }
    #playersList li {
      background: #000;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid #9c27b0;
      font-weight: bold;
      white-space: nowrap;
    }
    .panel { background: #000; color: #fff; border: 1px solid; border-radius: 10px; padding: 8px; }
    #scoreboard h3 { margin-top: 0; margin-bottom: 6px; color: #00e5ff; font-size: 0.9rem; }
    #optionsPreview { border-top: 1px solid #ff9100; margin-top: 12px; padding-top: 8px; }
    #optionsPreview h4 { color: #ff9100; margin: 0 0 4px; font-size: 0.78rem; }
    #exercisePicker { margin-bottom: 8px; padding: 6px 8px; }
    #exercisePicker.collapsed #exerciseList { display: none; }
    #exercisePicker.collapsed { padding: 3px 6px; }
    #exercisePickerHeader {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 4px;
    }
    #exercisePickerHeader h3 { margin: 0; font-size: 0.82rem; }
    #exerciseToggleBtn {
      background: #000;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.16);
      padding: 2px 6px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.72rem;
      line-height: 1.1;
    }
    .exercise-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .exercise-card h4 { margin: 0 0 6px; }
    .exercise-card p { margin: 4px 0; font-size: 0.95rem; }
    .exercise-card button {
      margin-top: 10px;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #00e5ff;
      background: #000;
      color: #fff;
    }
    .exercise-card button:disabled { opacity: 0.35; cursor: not-allowed; }
    #hostQuestionState {
      margin-top: 8px;
      border: 1px solid rgba(0,229,255,0.35);
      border-radius: 8px;
      padding: 6px;
      font-size: 0.78rem;
      color: #9befff;
      min-height: 36px;
    }
    @media (max-width: 960px) {
      #layout { flex-direction: column; }
      #scoreboard { width: 100%; flex: 1 1 auto; }
      #videoWrapper { width: 100%; }
    }
  </style>
</head>
<body>
  <div id="topBar">
    <h3>Lyrickahoot! <span id="roomCode"></span></h3>
    <div id="status"></div>
  </div>

  <div id="exercisePicker" class="panel">
    <div id="exercisePickerHeader">
      <h3>Seleccionar ejercicio</h3>
      <button id="exerciseToggleBtn" type="button">Minimizar</button>
    </div>
    <div id="exerciseList">Cargando ejercicios...</div>
  </div>

  <div id="layout">
    <div id="videoColumn">
      <div id="videoWrapper">
        <div id="player"></div>
        <div id="lyricsOverlay">
          <div id="lyrics"></div>
        </div>
      </div>
    </div>

    <div id="scoreboard">
      <h3>Ranking</h3>
      <ol id="rankingList"></ol>

      <div id="hostControls">
        <button id="repeatBtn">⏪</button>
        <button id="resumeBtn">▶</button>
        <button id="nextBtn">➡️</button>
        <button id="closeBtn">⛔</button>
        <button id="playersBtn">👥</button>
        <button id="editorBtn">🛠</button>
        <button id="newGameBtn">🆕</button>
        <button id="finishGameBtn">💰</button>
      </div>
      <div id="hostQuestionState">Sin pregunta abierta.</div>

      <div id="optionsPreview">
        <h4>Opciones</h4>
        <ul id="optionsList"></ul>
      </div>
    </div>
  </div>

  <div id="playersModal" class="modal hidden">
    <div class="modal-content">
      <h3>Jugadores conectados</h3>
      <ul id="playersList"></ul>
      <button id="closePlayersBtn">Cerrar</button>
    </div>
  </div>

  <div id="hostAuthOverlay" class="modal">
    <div class="modal-content">
      <h3>Acceso Host</h3>
      <div id="stepLogin">
        <input id="hostIdInput" placeholder="ID de usuario" style="width:90%; padding:8px; font-size:1em; margin-bottom:8px;" />
        <input id="hostNipInput" type="password" placeholder="NIP" style="width:90%; padding:8px; font-size:1em; margin-bottom:8px;" />
        <button id="hostLoginBtn">Entrar como admin</button>
      </div>
      <div id="stepPin" style="display:none;"></div>
      <p id="hostAuthError" style="color:#ff5252; display:none"></p>
    </div>
  </div>

  <script type="module" src="./game-screen.js"></script>
</body>
</html>
