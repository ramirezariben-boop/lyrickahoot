<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Jugador</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      font-family: sans-serif;
      padding: 20px;
      text-align: center;
      background: radial-gradient(circle at top, #0a0a0a, #000);
      color: white;
    }

    .option {
      height: 110px;
      font-size: 1.4em;
      font-weight: bold;
      border-radius: 16px;
      background: #000;
      color: white;
      border: 3px solid currentColor;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: neonPulse 2.2s ease-in-out infinite;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .option:hover {
      transform: scale(1.06);
      box-shadow: 0 0 28px currentColor;
    }

    .option:nth-child(1) { color: #ff2d2d; }
    .option:nth-child(2) { color: #2979ff; }
    .option:nth-child(3) { color: #00c853; }
    .option:nth-child(4) { color: #ff9100; }

    .option.selected {
      border-width: 4px;
      box-shadow: 0 0 45px currentColor;
      animation: none;
    }

    .option.disabled {
      opacity: 0.35;
      filter: grayscale(1);
      cursor: not-allowed;
      animation: none;
      pointer-events: none;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    #loginModal {
      background: white;
      padding: 25px;
      border-radius: 10px;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    #loginModal input {
      width: 100%;
      margin: 8px 0;
      padding: 10px;
      font-size: 1em;
    }

    #loginModal button {
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      font-size: 1em;
      cursor: pointer;
    }

    #loginError {
      color: red;
      font-size: 0.9em;
      margin-top: 8px;
    }

    #emojiSelector {
      margin-top: 12px;
    }

    #emojiGrid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
      margin-top: 6px;
    }

    .emoji {
      font-size: 1.4em;
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      transition: transform 0.1s, background 0.1s;
    }

    .emoji:hover {
      background: #f0f0f0;
      transform: scale(1.2);
    }

    .emoji.selected {
      background: #0dcaf0;
      color: white;
    }

    #title {
      font-size: 2em;
      text-shadow: 0 0 12px #00e5ff;
    }

    #pointsBox {
      margin-bottom: 12px;
      font-size: 1.1em;
      font-weight: bold;
      color: #0dcaf0;
    }

    #options {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
      max-width: 700px;
      margin: 30px auto;
    }

    @keyframes neonPulse {
      0% { box-shadow: 0 0 10px currentColor; }
      50% { box-shadow: 0 0 22px currentColor; }
      100% { box-shadow: 0 0 10px currentColor; }
    }
  </style>
</head>
<body>
  <div id="overlay">
    <div id="loginModal">
      <div id="stepRoom" style="color:black">
        <h2>Código del juego</h2>
        <input id="roomCodeInput" placeholder="Código del juego" />
        <button id="roomBtn">Entrar</button>
        <p class="error" id="roomError"></p>
      </div>

      <div id="stepProfile" style="display:none; color:black">
        <h2>Tu perfil</h2>
        <input id="studentIdInput" placeholder="ID de estudiante" />
        <input id="nipInput" placeholder="NIP (4 cifras)" type="password" />
        <input id="nicknameInput" placeholder="Nickname" />

        <div id="emojiSelector">
          <p>Elige un emoji:</p>
          <div id="emojiGrid">
            <span class="emoji">😄</span>
            <span class="emoji">🔥</span>
            <span class="emoji">🎧</span>
            <span class="emoji">🎸</span>
            <span class="emoji">⚡</span>
            <span class="emoji">🧠</span>
            <span class="emoji">👑</span>
            <span class="emoji">🚀</span>
            <span class="emoji">💀</span>
          </div>
        </div>

        <button id="loginBtn">Entrar al juego</button>
        <p class="error" id="loginError"></p>
      </div>
    </div>
  </div>

  <div id="pointsBox">⭐ Puntos: <span id="pointsValue">0</span></div>
  <h2 id="title">Esperando pregunta...</h2>
  <div id="options"></div>

  <script type="module" src="./player.js"></script>
</body>
</html>
